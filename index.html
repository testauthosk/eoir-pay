<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>EOIR — оплата подписки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  html,body{margin:0;height:100%;background:#0e0e10;color:#e9e9ea;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .spin{width:40px;height:40px;border:3px solid #2a2a2e;border-top-color:#2f6df6;
    border-radius:50%;animation:s .8s linear infinite;margin:0 auto 16px}
  @keyframes s{to{transform:rotate(360deg)}}
  .hint{margin-top:18px;font-size:14px;opacity:.85}
  a{color:#4b8dff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div>
  <div class="spin"></div>
  <div>Открываю оплату…</div>
  <div class="hint" id="fb" style="display:none"><a id="lnk" href="#">Открыть оплату вручную →</a></div>
</div>
<script>
  var MONTH = "https://buy.stripe.com/aFaeVd34ucSsgqN4yi9sk00";
  var YEAR  = "https://buy.stripe.com/cNi00j48y3hSeiFe8S9sk01";
  var tg = window.Telegram && window.Telegram.WebApp;
  try {
    if (tg) {
      tg.ready();
      tg.expand();                                   // full-HEIGHT sheet, but keeps the system status bar (battery/clock) visible
    }
  } catch (e) {}
  function p(n){ return new URLSearchParams(location.search).get(n); }
  var plan = (p("plan") === "year") ? "year" : "month";
  var base = (plan === "year") ? YEAR : MONTH;
  var uid = "";
  try { uid = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || ""; } catch (e) {}
  var url = base + (uid ? ("?client_reference_id=" + encodeURIComponent(uid)) : "");
  document.getElementById("lnk").href = url;
  setTimeout(function(){ location.replace(url); }, 400);   // let expand() apply first
  setTimeout(function(){ document.getElementById("fb").style.display = "block"; }, 2600);
</script>
</body>
</html>
